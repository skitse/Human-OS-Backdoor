# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Human OS semantic harness (Anthropic / Anthropic-compatible)"

prompts:
  - file://prompts/system.md

providers:
  - id: "anthropic:messages:{{env.ANTHROPIC_MODEL | default('claude-sonnet-4-6')}}"
    label: "{{env.ANTHROPIC_MODEL | default('claude-sonnet-4-6')}}"
    config:
      apiBaseUrl: "{{env.ANTHROPIC_BASE_URL | default('')}}"

tests: file://tests/cases.yaml

commandLineOptions:
  maxConcurrency: 1

defaultTest:
  options:
    transform: output.trim()
  assert:
    - type: python
      value: file://scripts/assertions.py:decision_contract_assert

outputPath: results/human-os-eval-anthropic.json
