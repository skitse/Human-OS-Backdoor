# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Human OS semantic harness (Anthropic)"
# Set in .env:
#   ANTHROPIC_API_KEY = sk-ant-...
#   ANTHROPIC_MODEL   = claude-haiku-4-5  (default)

prompts:
  - file://prompts/system.md

providers:
  - id: "anthropic:messages:{{env.ANTHROPIC_MODEL | default('claude-haiku-4-5')}}"
    label: "{{env.ANTHROPIC_MODEL | default('claude-haiku-4-5')}}"

tests: file://tests/cases.yaml

commandLineOptions:
  maxConcurrency: 2

defaultTest:
  options:
    transform: output.trim()
  assert:
    - type: python
      value: file://scripts/assertions.py:decision_contract_assert

outputPath: results/human-os-eval-anthropic.json
